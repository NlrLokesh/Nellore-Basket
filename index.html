<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nellore Basket – Premium Grocery</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR ORIGINAL CSS — only added tracker style */

#kgTracker {
  margin:10px 0 15px;
  background:#111;
  border:1px solid #333;
  border-radius:10px;
  padding:10px;
  font-size:12px;
  text-align:center;
  color:#aaa;
}
#kgBar {
  height:6px;
  background:linear-gradient(90deg,#d4af37,#f7d774);
  width:0%;
  border-radius:10px;
  transition:0.3s;
}
</style>
</head>

<body>

<div class="toast" id="toast"></div>

<div class="container">

<!-- YOUR DETAILS -->
<div class="section-title">✦ Your Details</div>

<div class="customer-card">
  <div class="input-group">
    <span class="input-icon">👤</span>
    <input type="text" id="customerName" placeholder="Full Name" oninput="updateSummary()" />
  </div>

  <!-- ✅ ADDED PHONE -->
  <div class="input-group" style="margin-top:10px;">
    <span class="input-icon">📱</span>
    <input type="tel" id="customerPhone" placeholder="Phone Number" oninput="updateSummary()" />
  </div>
</div>

<!-- ITEMS -->
<div class="section-title">✦ Select Items</div>

<!-- ✅ KG TRACKER -->
<div id="kgTracker">
  <span id="kgText">0 / 8 kg selected</span>
  <div style="background:#222;margin-top:6px;border-radius:10px;overflow:hidden;">
    <div id="kgBar"></div>
  </div>
</div>

<!-- YOUR ITEMS (UNCHANGED) -->
<!-- KEEP YOUR EXISTING ITEMS HERE EXACTLY (no change needed) -->

<!-- SUMMARY -->
<div class="section-title">✦ Order Summary</div>

<div class="summary-card">
  <div class="summary-empty" id="summaryEmpty">No items selected yet</div>
  <div id="summaryCustomer"></div>
  <div id="summaryRows"></div>
</div>

<button class="btn-whatsapp" onclick="sendToWhatsApp()">
💬 Place Order on WhatsApp
</button>

</div>

<script>
const MIN_KG = 8;

const PRICES = {
  'item-1':135,
  'item-2':115,
  'item-3':85,
  'item-4':120,
  'item-5':100,
  'item-6':90,
  'item-7':170
};

const NAMES = {
  'item-1':'Kandipappu',
  'item-2':'Minapappu',
  'item-3':'Senagapappu',
  'item-4':'Pesarapappu',
  'item-5':'Pachi Senagapappu',
  'item-6':'Saipappu',
  'item-7':'Chintapandu'
};

let toastTimer;

/* SAME SELECT LOGIC */
function selectItem(e, id) {
  if (e.target.closest('select')) return;

  const item = document.getElementById(id);
  const sel  = item.querySelector('select');

  if (item.classList.contains('active')) {
    item.classList.remove('active','selected','error');
    sel.value = '0';
    updateSummary();
    return;
  }

  if (item.classList.contains('selected')) {
    item.classList.remove('selected','error');
    sel.value = '0';
    return;
  }

  item.classList.add('selected');
}

/* SAME QTY */
function onQtyChange(e, id) {
  e.stopPropagation();

  const item = document.getElementById(id);
  const sel  = item.querySelector('select');

  if (parseFloat(sel.value) > 0) {
    item.classList.add('active');
    item.classList.remove('selected','error');
  } else {
    item.classList.remove('active');
    item.classList.add('selected');
  }

  updateSummary();
}

/* UPDATED SUMMARY */
function updateSummary() {
  const ids = Object.keys(PRICES);
  const name = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('customerPhone').value.trim();

  let total = 0;
  let totalKg = 0;
  let html = '';
  let hasItems = false;

  ids.forEach(id => {
    const qty = parseFloat(document.getElementById(id)?.querySelector('select')?.value || 0);

    if (qty > 0) {
      const price = PRICES[id] * qty;
      total += price;
      totalKg += qty;
      hasItems = true;

      html += `
      <div class="summary-row">
        <span class="s-name">${NAMES[id]}</span>
        <span class="s-qty">${qty} kg</span>
        <span class="s-price">₹ ${price}</span>
      </div>`;
    }
  });

  /* KG TRACK */
  document.getElementById('kgText').innerText = `${totalKg} / ${MIN_KG} kg selected`;
  document.getElementById('kgBar').style.width = Math.min((totalKg / MIN_KG)*100,100) + "%";

  const emptyEl = document.getElementById('summaryEmpty');
  const customerEl = document.getElementById('summaryCustomer');
  const rowsEl = document.getElementById('summaryRows');

  if (!hasItems) {
    emptyEl.style.display = 'block';
    customerEl.innerHTML = '';
    rowsEl.innerHTML = '';
    return;
  }

  emptyEl.style.display = 'none';

  /* CUSTOMER DISPLAY */
  customerEl.innerHTML = `
  <div class="summary-customer">
    <div class="cust-icon">👤</div>
    <div class="cust-info">
      <span class="cust-name">${name}</span>
      <span style="font-size:12px;color:#aaa;">📱 ${phone}</span>
    </div>
  </div>`;

  html += `
  <div class="summary-total">
    <span class="t-label">Total</span>
    <span class="t-amount">₹ ${total}</span>
  </div>`;

  rowsEl.innerHTML = html;
}

/* TOAST */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'),3000);
}

/* WHATSAPP */
function sendToWhatsApp() {
  const name = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('customerPhone').value.trim();

  if (!name) return showToast("Enter Name");
  if (!phone) return showToast("Enter Phone");

  let totalKg = 0;
  let total = 0;
  let msg = `🛒 Nellore Basket Order\n👤 ${name}\n📱 ${phone}\n\n`;

  Object.keys(PRICES).forEach(id=>{
    const qty = parseFloat(document.getElementById(id)?.querySelector('select')?.value || 0);
    if(qty>0){
      let price = PRICES[id]*qty;
      totalKg += qty;
      total += price;
      msg += `${NAMES[id]} ${qty}kg - ₹${price}\n`;
    }
  });

  if(totalKg < MIN_KG){
    return showToast("Minimum 8kg required");
  }

  msg += `\n📦 Total Qty: ${totalKg}kg\n💰 ₹${total}`;

  window.open(`https://wa.me/918008970033?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
