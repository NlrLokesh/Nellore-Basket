<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nellore Basket</title>

<style>
body { font-family: Arial; background:#0a0a0a; color:#fff; margin:0; }
header { text-align:center; padding:15px; font-size:22px; color:#c9a84c; }

.container { max-width:500px; margin:auto; padding:10px; }

.item {
  display:flex;
  align-items:center;
  background:#1a1a1a;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #2a2a2a;
  cursor:pointer;
}

.item.active { border:1px solid #c9a84c; background:#1c1800; }

.item img {
  width:70px;
  height:70px;
  border-radius:10px;
  object-fit:cover;
}

.details { flex:1; margin-left:10px; }

.name { font-weight:bold; }
.price { color:#c9a84c; }

select {
  padding:5px;
  border-radius:5px;
  background:#111;
  color:#fff;
}

.summary {
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-top:15px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#25D366;
  border:none;
  border-radius:10px;
  font-size:16px;
  color:#fff;
}

</style>
</head>

<body>

<header>Nellore Basket 🛒</header>

<div class="container">

<input type="text" id="name" placeholder="Enter your name" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;">

<!-- ITEM -->
<div class="item" onclick="selectItem(event,'item1')">
  <img src="images/kandi.webp" loading="lazy">
  <div class="details">
    <div class="name">Kandipappu</div>
    <div class="price">₹135/kg</div>
  </div>
  <select onchange="qtyChange(event,'item1')">
    <option value="0">Qty</option>
    <option value="1">1kg</option>
    <option value="1.5">1.5kg</option>
    <option value="2">2kg</option>
  </select>
</div>

<div class="item" onclick="selectItem(event,'item2')">
  <img src="images/minapa.webp" loading="lazy">
  <div class="details">
    <div class="name">Minapappu</div>
    <div class="price">₹115/kg</div>
  </div>
  <select onchange="qtyChange(event,'item2')">
    <option value="0">Qty</option>
    <option value="1">1kg</option>
    <option value="1.5">1.5kg</option>
    <option value="2">2kg</option>
  </select>
</div>

<div class="item" onclick="selectItem(event,'item3')">
  <img src="images/senaga.webp" loading="lazy">
  <div class="details">
    <div class="name">Senagapappu</div>
    <div class="price">₹85/kg</div>
  </div>
  <select onchange="qtyChange(event,'item3')">
    <option value="0">Qty</option>
    <option value="1">1kg</option>
    <option value="1.5">1.5kg</option>
    <option value="2">2kg</option>
  </select>
</div>

<div class="summary" id="summary">No items selected</div>

<button onclick="sendToWhatsApp()">Place Order</button>

</div>

<script>

const prices = {
  item1:135,
  item2:115,
  item3:85
};

const names = {
  item1:'Kandipappu',
  item2:'Minapappu',
  item3:'Senagapappu'
};

function selectItem(e,id){
  if(e.target.closest('select')) return;

  let item = document.querySelector(`[onclick*="${id}"]`);
  item.classList.toggle('active');

  if(!item.classList.contains('active')){
    item.querySelector('select').value=0;
  }

  updateSummary();
}

function qtyChange(e,id){
  e.stopPropagation();

  let item = document.querySelector(`[onclick*="${id}"]`);
  let qty = e.target.value;

  if(qty>0){
    item.classList.add('active');
  } else {
    item.classList.remove('active');
  }

  updateSummary();
}

function updateSummary(){
  let items = ['item1','item2','item3'];
  let text='';
  let total=0;
  let count=1;

  items.forEach(id=>{
    let item = document.querySelector(`[onclick*="${id}"]`);
    let qty = item.querySelector('select').value;

    if(qty>0){
      let price = prices[id]*qty;
      text += `${count}. ${names[id]} ${qty}kg - ₹${price}<br>`;
      total+=price;
      count++;
    }
  });

  if(text==''){
    document.getElementById('summary').innerHTML='No items selected';
  } else {
    document.getElementById('summary').innerHTML=text+`<br><b>Total: ₹${total}</b>`;
  }
}

function sendToWhatsApp(){

  let name=document.getElementById('name').value;

  if(!name){
    alert("Enter name");
    return;
  }

  let items=['item1','item2','item3'];
  let message=`🛒 Nellore Basket Order%0A👤 ${name}%0A%0A`;

  let total=0;
  let count=1;

  items.forEach(id=>{
    let item=document.querySelector(`[onclick*="${id}"]`);
    let qty=item.querySelector('select').value;

    if(qty>0){
      let price=prices[id]*qty;
      message+=`${count}. ${names[id]} ${qty}kg - ₹${price}%0A`;
      total+=price;
      count++;
    }
  });

  message+=`%0ATotal: ₹${total}`;

  // 🔴 CHANGE YOUR NUMBER HERE
  let phone="918008970033";

  window.open(`https://wa.me/${phone}?text=${message}`,'_blank');
}

</script>

</body>
</html>
