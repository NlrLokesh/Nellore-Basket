<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nellore Basket – Premium Grocery</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR DESIGN SAME */
body {
  font-family: 'Montserrat', sans-serif;
  background: #050505;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.section-title {
  margin-top: 20px;
  color: gold;
}

.customer-card input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 6px;
  border: 1px solid #333;
  background: #111;
  color: white;
}

/* Progress bar */
.progress-box {
  margin: 15px 0;
}
.progress-top {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #aaa;
}
.progress-bar-bg {
  height: 6px;
  background: #111;
  border-radius: 10px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, gold, #f7d774);
  transition: 0.3s;
}

/* Items */
.item {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
  padding: 10px;
  border: 1px solid #333;
  border-radius: 10px;
}

select {
  background: #111;
  color: white;
  border-radius: 6px;
}

/* Summary */
.summary-card {
  border: 1px solid #333;
  padding: 10px;
  border-radius: 10px;
}

.btn {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: green;
  color: white;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<!-- DETAILS -->
<div class="section-title">✦ Your Details</div>
<div class="customer-card">
  <input type="text" id="customerName" placeholder="Full Name" oninput="updateSummary()">
  <input type="tel" id="customerPhone" placeholder="Phone Number" oninput="updateSummary()">
</div>

<!-- PROGRESS -->
<div class="progress-box">
  <div class="progress-top">
    <span>Minimum Order</span>
    <span id="kgText">0 / 8 kg</span>
  </div>
  <div class="progress-bar-bg">
    <div id="kgBar" class="progress-bar-fill"></div>
  </div>
</div>

<!-- ITEMS -->
<div class="section-title">✦ Select Items</div>

<div class="item">
  <span>Kandipappu (₹135/kg)</span>
  <select onchange="updateSummary()" id="q1">
    <option value="0">0</option><option>1</option><option>2</option><option>3</option>
  </select>
</div>

<div class="item">
  <span>Minapappu (₹115/kg)</span>
  <select onchange="updateSummary()" id="q2">
    <option value="0">0</option><option>1</option><option>2</option><option>3</option>
  </select>
</div>

<div class="item">
  <span>Senagapappu (₹85/kg)</span>
  <select onchange="updateSummary()" id="q3">
    <option value="0">0</option><option>1</option><option>2</option><option>3</option>
  </select>
</div>

<!-- SUMMARY -->
<div class="section-title">✦ Order Summary</div>
<div class="summary-card" id="summary"></div>

<button class="btn" onclick="orderNow()">Place Order on WhatsApp</button>

</div>

<script>
const prices = [135,115,85];
const names = ["Kandipappu","Minapappu","Senagapappu"];

function updateSummary(){
  let total = 0;
  let totalKg = 0;
  let html = "";

  for(let i=1;i<=3;i++){
    let qty = parseFloat(document.getElementById("q"+i).value);
    if(qty>0){
      let cost = qty * prices[i-1];
      total += cost;
      totalKg += qty;
      html += `${names[i-1]} - ${qty}kg = ₹${cost}<br>`;
    }
  }

  document.getElementById("summary").innerHTML = html + "<br>Total: ₹"+total;

  // progress bar
  let percent = Math.min((totalKg/8)*100,100);
  document.getElementById("kgBar").style.width = percent+"%";
  document.getElementById("kgText").innerText = totalKg+" / 8 kg";
}

function orderNow(){
  let name = document.getElementById("customerName").value;
  let phone = document.getElementById("customerPhone").value;

  if(!name){
    alert("Enter name");
    return;
  }

  if(!phone || phone.length<10){
    alert("Enter valid phone");
    return;
  }

  let msg = "🛒 Nellore Basket Order\n";
  msg += "Name: "+name+"\nPhone: "+phone+"\n\n";

  let totalKg = 0;

  for(let i=1;i<=3;i++){
    let qty = parseFloat(document.getElementById("q"+i).value);
    if(qty>0){
      msg += names[i-1]+" - "+qty+"kg\n";
      totalKg += qty;
    }
  }

  if(totalKg < 8){
    alert("Minimum 8kg required");
    return;
  }

  window.open("https://wa.me/918008970033?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
